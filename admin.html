<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>RD TECH | Debug Terminal</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body { background: #020617; color: white; font-family: sans-serif; padding: 20px; }
        .box { background: #0f172a; border: 1px solid #ef4444; padding: 20px; border-radius: 20px; }
    </style>
</head>
<body>
    <div class="box">
        <h1 style="color:#ef4444; font-weight:bold; margin-bottom:15px;">RD ADMIN DEBUG V5</h1>
        <input type="email" id="u-email" class="w-full p-3 mb-2 bg-black border border-slate-700" placeholder="Test Email">
        <input type="text" id="u-pass" class="w-full p-3 mb-4 bg-black border border-slate-700" placeholder="Password">
        <button onclick="runTest()" id="btn" class="w-full bg-red-600 p-4 font-bold rounded">RUN DATABASE TEST</button>
        <div id="out" class="mt-4 text-xs font-mono text-slate-400">System Ready.</div>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.1/firebase-app.js";
        import { getAuth, createUserWithEmailAndPassword, signOut } from "https://www.gstatic.com/firebasejs/10.8.1/firebase-auth.js";
        import { initializeFirestore, doc, setDoc } from "https://www.gstatic.com/firebasejs/10.8.1/firebase-firestore.js";

        const config = {
            apiKey: "AIzaSyBWRGm_ixHVuGKyve4jBcWcpUNJFNN_IZk",
            authDomain: "rd-tech-subs-bc1d4.firebaseapp.com",
            projectId: "rd-tech-subs-bc1d4",
            storageBucket: "rd-tech-subs-bc1d4.firebasestorage.app",
            messagingSenderId: "134428732541",
            appId: "1:134428732541:web:eb61db52ca8ae82b281514"
        };

        const app = initializeApp(config);
        const auth = getAuth(app);
        const db = initializeFirestore(app, { experimentalForceLongPolling: true });

        window.runTest = async function() {
            const out = document.getElementById('out');
            const email = document.getElementById('u-email').value;
            const pass = document.getElementById('u-pass').value;
            
            if(!email || !pass) { alert("Fill fields"); return; }
            
            out.innerHTML = "STEP 1: Testing Authentication...";
            try {
                await createUserWithEmailAndPassword(auth, email, pass);
                await signOut(auth);
                out.innerHTML += "<br>✅ Auth Success!";
            } catch(e) {
                if(e.code === 'auth/email-already-in-use') { out.innerHTML += "<br>✅ Auth: User exists (OK)"; }
                else { alert("AUTH ERROR: " + e.message); return; }
            }

            out.innerHTML += "<br>STEP 2: Testing Firestore Write...";
            try {
                await setDoc(doc(db, "subscriptions", email), { status: "active", time: Date.now() });
                out.innerHTML += "<br>✅ DATABASE SUCCESS! USER ADDED.";
                alert("IT WORKS! Check your Firebase Dashboard now.");
            } catch(e) {
                console.error(e);
                alert("DATABASE ERROR: " + e.message);
                out.innerHTML += "<br>❌ FAILED: " + e.code;
            }
        };
    </script>
</body>
</html>
