<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>RD TECH | Master Admin Terminal</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700&family=Inter:wght@400;600&display=swap');
        * { -webkit-user-select: none; user-select: none; outline: none !important; }
        .selectable { -webkit-user-select: text !important; user-select: text !important; }
        body { 
            background: #020617; color: #f8fafc; font-family: 'Inter', sans-serif; 
            display: flex; align-items: flex-start; justify-content: center; 
            min-height: 100vh; margin: 0; padding: 20px 0;
            background-image: radial-gradient(circle at 50% 50%, #450a0a 0%, #020617 100%);
        }
        .rd-panel { 
            background: rgba(15, 23, 42, 0.95); border: 1px solid #ef4444; 
            box-shadow: 0 0 50px rgba(239, 68, 68, 0.2); 
            width: 95%; max-width: 500px; border-radius: 30px; backdrop-filter: blur(15px);
        }
        .tech-font { font-family: 'Orbitron', sans-serif; }
        .btn-red { background: linear-gradient(90deg, #ef4444, #991b1b); transition: 0.3s; }
        .btn-red:active { transform: scale(0.95); }
        .btn-dark { background: #0f172a; border: 1px solid #334155; transition: 0.3s; }
        .btn-dark:active { background: #1e293b; }
        input, select { background: rgba(0,0,0,0.5); border: 1px solid #334155; color: white; }
        input:focus, select:focus { border-color: #ef4444; outline: none; }
        ::-webkit-scrollbar { width: 6px; }
        ::-webkit-scrollbar-track { background: transparent; }
        ::-webkit-scrollbar-thumb { background: #ef4444; border-radius: 10px; }
    </style>
</head>
<body oncontextmenu="return false;">

    <div class="rd-panel overflow-hidden mb-10">
        <div class="p-8 pb-4 text-center border-b border-white/5 relative">
            <button onclick="location.reload()" class="absolute top-6 right-6 text-slate-500 hover:text-red-500 transition-colors hidden" id="lock-sys-btn">
                <i class="fas fa-lock text-lg"></i>
            </button>
            <i class="fas fa-server text-4xl text-red-500 mb-3 drop-shadow-[0_0_15px_rgba(239,68,68,0.5)]"></i>
            <h1 class="tech-font text-white font-bold text-xl uppercase tracking-tighter">RD TECH ADMIN</h1>
            <p class="text-[9px] text-red-500 tracking-[0.5em] font-bold mt-1 uppercase">Master Control Node</p>
        </div>

        <div class="p-6">
            <div id="admin-gate">
                <input type="password" id="admin-pass" class="w-full rounded-2xl p-4 mb-4 text-center text-red-500 tracking-[0.8em]" placeholder="ADMIN PIN">
                <button onclick="unlockAdmin()" class="w-full btn-red text-white py-4 rounded-2xl tech-font text-xs font-bold uppercase tracking-widest shadow-lg shadow-red-900/50">Verify Admin</button>
            </div>

            <div id="management-console" class="hidden space-y-6">
                
                <div class="grid grid-cols-3 gap-2 text-center">
                    <div class="bg-black/60 border border-slate-800 rounded-xl p-3">
                        <p class="text-[8px] text-slate-500 tech-font uppercase tracking-widest mb-1">Total</p>
                        <p id="stat-total" class="text-xl font-bold text-white tech-font">0</p>
                    </div>
                    <div class="bg-black/60 border border-green-900/50 rounded-xl p-3">
                        <p class="text-[8px] text-green-500 tech-font uppercase tracking-widest mb-1">Active</p>
                        <p id="stat-active" class="text-xl font-bold text-green-400 tech-font">0</p>
                    </div>
                    <div class="bg-black/60 border border-red-900/50 rounded-xl p-3">
                        <p class="text-[8px] text-red-500 tech-font uppercase tracking-widest mb-1">Blocked</p>
                        <p id="stat-blocked" class="text-xl font-bold text-red-400 tech-font">0</p>
                    </div>
                </div>

                <div class="bg-black/40 p-5 rounded-2xl border border-red-900/30 shadow-inner">
                    <h2 class="tech-font text-xs text-red-400 mb-4 uppercase tracking-wider"><i class="fas fa-user-shield mr-2"></i>Access Control</h2>
                    <input type="email" id="user-email" class="w-full rounded-xl p-3 mb-3 text-sm selectable" placeholder="Customer Email">
                    <input type="text" id="user-pass" class="w-full rounded-xl p-3 mb-3 text-sm selectable" placeholder="New Password (Leave blank to keep old)">
                    <select id="user-status" class="w-full rounded-xl p-3 mb-4 text-sm font-bold">
                        <option value="active" class="text-green-500">Status: ACTIVE (Paid)</option>
                        <option value="expired" class="text-yellow-500">Status: EXPIRED (Must Renew)</option>
                        <option value="banned" class="text-red-600">Status: BANNED / BLOCKED (Malicious)</option>
                    </select>
                    <button id="save-btn" class="w-full btn-red text-white py-3 rounded-xl tech-font text-xs font-bold uppercase tracking-widest shadow-lg shadow-red-900/50">
                        Execute Override
                    </button>
                    <p id="sys-msg" class="text-center text-[10px] mt-3 font-mono h-4 text-slate-400"></p>
                </div>

                <div class="bg-black/40 p-5 rounded-2xl border border-slate-800">
                    <div class="flex justify-between items-center mb-4">
                        <h2 class="tech-font text-xs text-slate-300 uppercase tracking-wider"><i class="fas fa-users mr-2"></i>Database</h2>
                        <button onclick="loadUsers()" class="text-slate-400 hover:text-white transition-colors"><i class="fas fa-sync-alt"></i></button>
                    </div>
                    
                    <input type="text" id="search-users" class="w-full bg-black/60 border border-slate-700 rounded-lg p-2 mb-3 text-xs text-center outline-none" placeholder="Search by Email...">

                    <div id="user-list" class="space-y-2 max-h-[300px] overflow-y-auto pr-2">
                        <p class="text-center text-slate-500 text-xs py-4 tech-font uppercase">Loading Database...</p>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.1/firebase-app.js";
        import { getAuth, createUserWithEmailAndPassword, signOut } from "https://www.gstatic.com/firebasejs/10.8.1/firebase-auth.js";
        import { getFirestore, doc, setDoc, deleteDoc, collection, getDocs } from "https://www.gstatic.com/firebasejs/10.8.1/firebase-firestore.js";

        // YOUR FIREBASE KEYS
        const firebaseConfig = {
            apiKey: "AIzaSyBWRGm_ixHVuGKyve4jBcWcpUNJFNN_IZk",
            authDomain: "rd-tech-subs-bc1d4.firebaseapp.com",
            projectId: "rd-tech-subs-bc1d4",
            storageBucket: "rd-tech-subs-bc1d4.firebasestorage.app",
            messagingSenderId: "134428732541",
            appId: "1:134428732541:web:eb61db52ca8ae82b281514"
        };

        const app = initializeApp(firebaseConfig);
        const auth = getAuth(app);
        const db = getFirestore(app);
        
        let allUsersData = [];

        window.unlockAdmin = function() {
            if(document.getElementById('admin-pass').value === "RDADMIN7") {
                document.getElementById('admin-gate').classList.add('hidden');
                document.getElementById('management-console').classList.remove('hidden');
                document.getElementById('lock-sys-btn').classList.remove('hidden');
                window.loadUsers(); 
            } else { alert("UNAUTHORIZED"); }
        }

        window.editUser = function(email, status) {
            document.getElementById('user-email').value = email;
            document.getElementById('user-status').value = status;
            document.getElementById('user-pass').value = '';
            document.getElementById('sys-msg').innerText = "Ready to modify: " + email;
            document.getElementById('sys-msg').style.color = "#3b82f6";
            window.scrollTo({ top: 0, behavior: 'smooth' });
        }

        // NEW: Delete User Logic
        window.deleteUser = async function(email) {
            if(confirm(`Are you sure you want to permanently DELETE ${email}?`)) {
                try {
                    await deleteDoc(doc(db, "subscriptions", email));
                    document.getElementById('sys-msg').innerText = `DELETED: ${email}`;
                    document.getElementById('sys-msg').style.color = "#ef4444";
                    window.loadUsers();
                } catch(e) {
                    alert("Error deleting user: " + e.message);
                }
            }
        }

        window.loadUsers = async function() {
            const listDiv = document.getElementById('user-list');
            listDiv.innerHTML = '<div class="text-center py-6"><div class="w-6 h-6 border-2 border-red-500 border-t-transparent rounded-full animate-spin inline-block"></div></div>';
            
            try {
                const querySnapshot = await getDocs(collection(db, "subscriptions"));
                allUsersData = [];
                let total = 0, active = 0, blocked = 0;

                querySnapshot.forEach((doc) => {
                    total++;
                    const data = doc.data();
                    if(data.status === 'active') active++;
                    if(data.status === 'banned') blocked++;
                    allUsersData.push({ email: doc.id, status: data.status || 'expired' });
                });

                // Update Stats
                document.getElementById('stat-total').innerText = total;
                document.getElementById('stat-active').innerText = active;
                document.getElementById('stat-blocked').innerText = blocked;

                renderGrid(allUsersData);
            } catch(e) {
                listDiv.innerHTML = `<p class="text-center text-red-500 text-[10px] py-4">Database Read Error.<br>Check Firestore Rules.</p>`;
            }
        }

        function renderGrid(users) {
            const listDiv = document.getElementById('user-list');
            let html = '';
            
            users.forEach((user) => {
                let statusColor = 'text-yellow-500'; let bgGlow = 'border-yellow-900/30'; let icon = 'fa-exclamation-triangle';
                if(user.status === 'active') { statusColor = 'text-green-500'; bgGlow = 'border-green-900/30'; icon = 'fa-check-circle'; }
                if(user.status === 'banned') { statusColor = 'text-red-500'; bgGlow = 'border-red-900/50'; icon = 'fa-ban'; }

                html += `
                    <div class="bg-black/60 p-3 rounded-xl border ${bgGlow} flex justify-between items-center transition-all hover:bg-black/80">
                        <div class="overflow-hidden pr-2 flex-1">
                            <p class="text-white text-[11px] font-mono truncate mb-1 selectable">${user.email}</p>
                            <p class="${statusColor} text-[8px] font-bold uppercase tracking-widest"><i class="fas ${icon} mr-1"></i>${user.status}</p>
                        </div>
                        <div class="flex gap-1">
                            <button onclick="editUser('${user.email}', '${user.status}')" class="bg-slate-800 text-slate-300 hover:text-white px-2 py-1.5 rounded text-[9px] uppercase font-bold tech-font tracking-wider"><i class="fas fa-edit"></i></button>
                            <button onclick="deleteUser('${user.email}')" class="bg-red-900/30 text-red-500 hover:bg-red-600 hover:text-white px-2 py-1.5 rounded text-[9px] uppercase font-bold tech-font tracking-wider"><i class="fas fa-trash"></i></button>
                        </div>
                    </div>
                `;
            });

            if(html === '') html = '<p class="text-center text-slate-500 text-xs py-4 tech-font uppercase">No records found.</p>';
            listDiv.innerHTML = html;
        }

        // NEW: Search Filter Logic
        document.getElementById('search-users').addEventListener('input', function(e) {
            const term = e.target.value.toLowerCase();
            const filtered = allUsersData.filter(u => u.email.includes(term));
            renderGrid(filtered);
        });

        document.getElementById('save-btn').addEventListener('click', async () => {
            const email = document.getElementById('user-email').value.trim().toLowerCase();
            const pass = document.getElementById('user-pass').value.trim();
            const status = document.getElementById('user-status').value;
            const msgBox = document.getElementById('sys-msg');

            if(!email) { msgBox.innerText = "Error: Target Email Required."; msgBox.style.color = "#ef4444"; return; }
            msgBox.innerText = "Executing Override..."; msgBox.style.color = "#fbbf24";

            try {
                if(pass && pass.length >= 6) {
                    try {
                        await createUserWithEmailAndPassword(auth, email, pass);
                        await signOut(auth); // Keep admin signed out of user accounts
                    } catch(authErr) {
                        if(authErr.code !== 'auth/email-already-in-use') throw authErr; 
                    }
                }
                await setDoc(doc(db, "subscriptions", email), {
                    status: status, updatedAt: new Date().toISOString()
                }, { merge: true });

                msgBox.innerText = `SUCCESS: ${email} is now ${status.toUpperCase()}`;
                msgBox.style.color = "#22c55e";
                document.getElementById('user-pass').value = '';
                window.loadUsers();
            } catch(error) {
                msgBox.innerText = "System Error: " + error.message;
                msgBox.style.color = "#ef4444";
            }
        });
    </script>
</body>
    </html>
