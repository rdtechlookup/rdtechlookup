<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>RD TECH LOOKUP | Official Terminal</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700&family=Inter:wght@400;600&display=swap');
        
        * { -webkit-user-select: none; user-select: none; outline: none !important; }
        .selectable { -webkit-user-select: text !important; user-select: text !important; }

        body { 
            background: #020617; 
            color: #f8fafc; 
            font-family: 'Inter', sans-serif; 
            display: flex; 
            align-items: center; 
            justify-content: center; 
            min-height: 100vh; 
            margin: 0;
            background-image: radial-gradient(circle at 50% 50%, #052e16 0%, #020617 100%);
        }

        .rd-panel { 
            background: rgba(15, 23, 42, 0.9); 
            border: 1px solid #22c55e; 
            box-shadow: 0 0 50px rgba(34, 197, 94, 0.2); 
            width: 95%; 
            max-width: 420px; 
            border-radius: 30px; 
            backdrop-filter: blur(15px);
        }

        .tech-font { font-family: 'Orbitron', sans-serif; }

        .logo-container {
            width: 140px;
            height: 140px;
            margin: 0 auto;
        }

        .intel-card { 
            background: #0f172a; 
            border: 1px solid #1e293b; 
            border-left: 5px solid #22c55e; 
            border-radius: 15px; 
            padding: 18px; 
            margin-bottom: 12px;
        }

        .search-btn {
            background: linear-gradient(90deg, #22c55e, #15803d);
            transition: 0.3s;
        }

        .search-btn:active { transform: scale(0.95); }

        ::-webkit-scrollbar { width: 4px; }
        ::-webkit-scrollbar-thumb { background: #166534; border-radius: 10px; }
    </style>
</head>
<body oncontextmenu="return false;">

    <div class="rd-panel overflow-hidden">
        <!-- Header Section -->
        <div class="p-8 pb-4 text-center border-b border-white/5">
            <div class="logo-container mb-2">
                <img src="https://i.ibb.co/DPsHqPJ2/Chat-GPT-Image-Apr-15-2026-04-26-05-PM.png" alt="RD TECH Logo" class="w-full h-full object-contain">
            </div>
            <h1 class="tech-font text-white font-bold text-xl tracking-tighter uppercase">RD TECH LOOKUP</h1>
            <p class="text-[9px] text-green-500 tracking-[0.5em] font-bold mt-1">SECURE INTEL TERMINAL</p>
        </div>

        <div class="p-6">
            <!-- Auth (Password: RD7) -->
            <div id="auth-gate">
                <input type="password" id="sys-pass" class="w-full bg-black/60 border border-slate-800 rounded-2xl p-4 mb-4 text-center text-green-500 tracking-[0.8em] focus:border-green-500 transition-all outline-none" placeholder="••••">
                <button onclick="checkPass()" class="w-full search-btn text-white py-4 rounded-2xl tech-font text-xs font-bold tracking-widest">AUTHENTICATE</button>
            </div>

            <!-- Search Section -->
            <div id="search-section" class="hidden">
                <div class="flex gap-2 mb-6 bg-black/40 p-1 rounded-2xl border border-slate-800">
                    <input type="text" id="phone-in" class="flex-1 bg-transparent p-4 text-green-400 font-mono text-lg outline-none" placeholder="Enter the Target Number">
                    <button onclick="startLookup()" class="search-btn px-6 rounded-xl text-white">
                        <i class="fas fa-search"></i>
                    </button>
                </div>

                <!-- Loader -->
                <div id="loader" class="hidden text-center py-8">
                    <div class="w-10 h-10 border-4 border-green-500 border-t-transparent rounded-full animate-spin inline-block mb-3"></div>
                    <p class="text-[9px] tech-font text-green-700 tracking-widest uppercase">Decrypted Link Established...</p>
                </div>

                <!-- Results -->
                <div id="results-area" class="hidden space-y-4 max-h-[380px] overflow-y-auto pr-2 selectable"></div>
            </div>
        </div>

        <!-- Footer -->
        <div class="p-4 bg-black/40 text-center border-t border-white/5">
            <p class="text-[9px] text-slate-500 tech-font">All copyrights reserved ©RD TECH HUB</p>
        </div>
    </div>

    <script>
        const KEY = "RD7";
        const _a = "aHR0cHM6Ly95YXNoLWNvZGUtYWktZnJlZS1hcGkuYWxwaGFtb3ZpZXMud29ya2Vycy5kZXYvP251bWJlcj0=";

        function checkPass() {
            if(document.getElementById('sys-pass').value === KEY) {
                document.getElementById('auth-gate').classList.add('hidden');
                document.getElementById('search-section').classList.remove('hidden');
            } else { alert("ACCESS DENIED"); }
        }

        async function startLookup() {
            const num = document.getElementById('phone-in').value.trim();
            const loader = document.getElementById('loader');
            const wrap = document.getElementById('results-area');

            if(!num) return;
            loader.classList.remove('hidden');
            wrap.classList.add('hidden');
            wrap.innerHTML = "";

            try {
                const r = await fetch(atob(_a) + num);
                const data = await r.json();
                const results = data.results || (data.full_name ? [data] : []);

                if (results.length > 0) {
                    results.forEach((item) => {
                        const card = document.createElement('div');
                        card.className = "intel-card";
                        card.innerHTML = `
                            <div class="flex justify-between items-center mb-3 border-b border-slate-800/50 pb-2">
                                <span class="text-green-400 font-bold text-xs uppercase tech-font">${item.full_name}</span>
                                <i class="fas fa-shield-check text-green-900 text-[10px]"></i>
                            </div>
                            <div class="space-y-2 text-[11px] selectable">
                                <p><span class="text-slate-500 uppercase text-[9px]">Father:</span> ${item.father_name || 'N/A'}</p>
                                <p><span class="text-slate-500 uppercase text-[9px]">Contact:</span> ${item.contact_info?.primary || num}</p>
                                <p><span class="text-slate-500 uppercase text-[9px]">Address:</span> <span class="text-slate-300 leading-tight">${item.location?.address}</span></p>
                                <div class="mt-2 text-green-600 font-bold uppercase text-[9px]">${item.location?.operator_circle || 'ACTIVE NODE'}</div>
                            </div>
                        `;
                        wrap.appendChild(card);
                    });
                    wrap.classList.remove('hidden');
                } else {
                    wrap.innerHTML = `<p class="text-center py-10 text-slate-600 text-[9px] tech-font uppercase">DATABASE_ENTRY_NOT_FOUND</p>`;
                    wrap.classList.remove('hidden');
                }
            } catch (e) {
                wrap.innerHTML = `
                    <div class="text-center p-6 bg-red-950/20 border border-red-900/30 rounded-2xl">
                        <p class="text-red-500 text-[9px] tech-font uppercase mb-4">Channel Restricted by Browser</p>
                        <button onclick="window.open(atob('${_a}') + '${num}')" class="bg-red-700 text-white px-5 py-2 rounded-lg font-bold text-[9px] uppercase shadow-lg">Decrypt Intel</button>
                    </div>`;
                wrap.classList.remove('hidden');
            } finally {
                loader.classList.add('hidden');
            }
        }
    </script>
</body>
</html>
